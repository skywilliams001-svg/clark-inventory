<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Clark's Inventory</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#C62828">
    <style>
        :root { --primary: #C62828; --secondary: #F57C00; }
        body { margin: 0; font-family: sans-serif; background: #fafafa; }
        .navbar { background: var(--primary); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; background: #eee; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #ccc; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-pane { display: none; padding: 15px; }
        .tab-pane.active { display: block; }
        .menu-btn { display: block; width: 100%; padding: 15px; margin: 5px 0; font-size: 1.1rem; border: 2px solid var(--primary); border-radius: 12px; background: white; color: var(--primary); }
        .menu-btn:active { background: var(--primary); color: white; }
        .btn { border: none; border-radius: 10px; padding: 12px; font-size: 1rem; cursor: pointer; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: white; border: 1px solid var(--primary); color: var(--primary); }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
        .install-btn { display: none; background: transparent; border: 1px solid white; color: white; padding: 8px 12px; border-radius: 6px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <span>🐷 Clark's Inventory</span>
        <button class="install-btn" id="installBtn" onclick="installApp()">📲 Install App</button>
    </nav>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('pos')">POS</button>
        <button class="tab-btn" onclick="switchTab('sales')">Sales</button>
        <button class="tab-btn" onclick="switchTab('ingredients')">Ingredients</button>
        <button class="tab-btn" onclick="switchTab('reports')">Reports</button>
    </div>

    <!-- POS Tab -->
    <div id="pos" class="tab-pane active">
        <h2>Quick Menu</h2>
        <button class="menu-btn" onclick="addToCart('Crispy Pork Sisig Full', 100)">Crispy Pork Sisig Full - ₱100</button>
        <button class="menu-btn" onclick="addToCart('Crispy Bagnet', 100)">Crispy Bagnet - ₱100</button>
        <button class="menu-btn" onclick="addToCart('Crispy Sisig with Rice', 59)">Crispy Sisig with Rice - ₱59</button>
        <button class="menu-btn" onclick="addToCart('Tofu Sisig', 49)">Tofu Sisig - ₱49</button>

        <h3>Current Order</h3>
        <table id="cartTable"><thead><tr><th>Item</th><th>Qty</th><th>Total</th><th></th></tr></thead><tbody></tbody></table>
        <p><strong>Total: ₱<span id="cartTotal">0.00</span></strong></p>
        <input type="number" id="amountPaid" placeholder="Amount customer paid" step="0.01" style="width:100%;padding:10px;margin-bottom:10px;">
        <p>Change: ₱<span id="changeAmount">0.00</span></p>
        <button class="btn btn-success" style="width:100%;" onclick="submitSale()">✅ Submit Sale</button>
        <div id="saleMessage"></div>
        <div id="receiptArea" style="display:none; margin-top:15px; border:1px dashed #000; padding:10px;"></div>
    </div>

    <!-- Sales Tab -->
    <div id="sales" class="tab-pane">
        <h2>Sales History</h2>
        <input type="date" id="salesFrom" style="width:48%;"> <input type="date" id="salesTo" style="width:48%;">
        <button class="btn btn-primary" style="width:100%; margin:5px 0;" onclick="refreshSalesList()">🔍 Filter</button>
        <table id="salesTable"><thead><tr><th>Date</th><th>Total</th><th>Paid</th><th>Change</th><th></th></tr></thead><tbody></tbody></table>
    </div>

    <!-- Ingredients Tab -->
    <div id="ingredients" class="tab-pane">
        <h2>Log Ingredient Purchase</h2>
        <input type="text" id="ingName" placeholder="Ingredient" style="width:100%;padding:10px;margin:5px 0;">
        <input type="text" id="ingQty" placeholder="Qty (e.g., 2 kg)" style="width:100%;padding:10px;margin:5px 0;">
        <input type="number" id="ingPrice" placeholder="Price" step="0.01" style="width:100%;padding:10px;margin:5px 0;">
        <input type="date" id="ingDate" style="width:100%;padding:10px;margin:5px 0;">
        <input type="text" id="ingSupplier" placeholder="Supplier (optional)" style="width:100%;padding:10px;margin:5px 0;">
        <button class="btn btn-danger" style="width:100%;" onclick="addIngredient()">Add Purchase</button>
        <table id="ingredientsTable"><thead><tr><th>Date</th><th>Ingredient</th><th>Qty</th><th>Price</th></tr></thead><tbody></tbody></table>
    </div>

    <!-- Reports Tab -->
    <div id="reports" class="tab-pane">
        <h2>Profit Report</h2>
        <input type="date" id="reportFrom" style="width:48%;"> <input type="date" id="reportTo" style="width:48%;">
        <button class="btn btn-primary" style="width:100%; margin:5px 0;" onclick="calculateReport()">Calculate</button>
        <div style="display:flex; margin-top:15px;">
            <div style="flex:1; background:#28a745; color:white; padding:15px; margin:5px; border-radius:10px;"><strong>Sales</strong><br><span id="rSales">₱0</span></div>
            <div style="flex:1; background:#dc3545; color:white; padding:15px; margin:5px; border-radius:10px;"><strong>Costs</strong><br><span id="rCosts">₱0</span></div>
            <div style="flex:1; background:#007bff; color:white; padding:15px; margin:5px; border-radius:10px;"><strong>Profit</strong><br><span id="rProfit">₱0</span></div>
        </div>
        <hr>
        <button class="btn btn-outline" style="width:100%;" onclick="exportData()">📤 Export Backup (JSON)</button>
        <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importBackup(this)">
        <button class="btn btn-outline" style="width:100%;" onclick="document.getElementById('importFile').click()">📥 Import Backup</button>
        <button class="btn btn-outline" style="width:100%; margin-top:10px; color:red;" onclick="clearAllData()">🗑️ Clear All Data</button>
    </div>

    <script>
        // ---------- Global Error Alert ----------
        window.onerror = function(msg) { alert('JS Error: ' + msg); };

        // ---------- Local Storage Helpers ----------
        const KEY = 'clarks_sisig';
        function getData() { try { return JSON.parse(localStorage.getItem(KEY)) || { sales:[], saleItems:[], ingredients:[] }; } catch(e) { return { sales:[], saleItems:[], ingredients:[] }; } }
        function saveData(d) { localStorage.setItem(KEY, JSON.stringify(d)); }
        function genId() { return Date.now().toString(36) + Math.random().toString(36).substring(2,7); }

        // ---------- Tab Switching ----------
        function switchTab(tabId) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        // ---------- Cart (global) ----------
        let cart = [];

        function addToCart(name, price) {
            const existing = cart.find(i => i.name === name);
            if (existing) existing.qty++; else cart.push({ name, price, qty: 1 });
            renderCart();
        }

        function renderCart() {
            const tbody = document.querySelector('#cartTable tbody');
            tbody.innerHTML = '';
            let total = 0;
            cart.forEach((item, idx) => {
                const lineTotal = item.price * item.qty;
                total += lineTotal;
                tbody.innerHTML += `<tr>
                    <td>${item.name}</td>
                    <td><input type="number" value="${item.qty}" min="1" style="width:50px" onchange="updateQty(${idx}, this.value)"></td>
                    <td>₱${lineTotal.toFixed(2)}</td>
                    <td><button onclick="removeFromCart(${idx})" style="background:none;border:none;color:red;font-size:1.2rem;">&times;</button></td>
                </tr>`;
            });
            document.getElementById('cartTotal').innerText = total.toFixed(2);
            computeChange();
        }

        function updateQty(idx, newQty) {
            const qty = parseInt(newQty);
            if (qty >= 1) cart[idx].qty = qty;
            else cart[idx].qty = 1;
            renderCart();
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            renderCart();
        }

        function computeChange() {
            const total = parseFloat(document.getElementById('cartTotal').innerText) || 0;
            const paid = parseFloat(document.getElementById('amountPaid').value) || 0;
            const change = paid - total;
            document.getElementById('changeAmount').innerText = change >= 0 ? change.toFixed(2) : '0.00';
        }
        document.getElementById('amountPaid').addEventListener('input', computeChange);

        function submitSale() {
            if (cart.length === 0) { alert('Cart empty'); return; }
            const total = parseFloat(document.getElementById('cartTotal').innerText);
            const paid = parseFloat(document.getElementById('amountPaid').value);
            if (isNaN(paid) || paid < total) { alert('Insufficient payment'); return; }
            const change = paid - total;
            const saleId = genId();
            const sale = { id: saleId, saleDate: new Date().toISOString(), totalAmount: total, amountPaid: paid, changeGiven: change };
            const data = getData();
            data.sales.push(sale);
            cart.forEach(item => data.saleItems.push({ id: genId(), saleId, itemName: item.name, unitPrice: item.price, quantity: item.qty, lineTotal: item.price*item.qty }));
            saveData(data);
            // Receipt
            let receiptHtml = <h4>Clark's Crispy Sisig Bagnet</h4><p>${new Date(sale.saleDate).toLocaleString()}</p><hr><ul>;
            cart.forEach(item => receiptHtml += <li>${item.name} x${item.qty} = ₱${(item.price*item.qty).toFixed(2)}</li>);
            receiptHtml += </ul><hr><p>Total: ₱${total.toFixed(2)}<br>Paid: ₱${paid.toFixed(2)}<br>Change: ₱${change.toFixed(2)}</p>;
            document.getElementById('receiptArea').innerHTML = receiptHtml;
            document.getElementById('receiptArea').style.display = 'block';
            document.getElementById('receiptArea').onclick = () => window.print();
            cart = []; renderCart();
            document.getElementById('amountPaid').value = '';
            document.getElementById('changeAmount').innerText = '0.00';
            document.getElementById('saleMessage').innerHTML = '<div style="color:green;">Sale recorded!</div>';
            setTimeout(() => document.getElementById('saleMessage').innerHTML = '', 3000);
            refreshSalesList();
        }

        // ---------- Sales History ----------
        function refreshSalesList() {
            const data = getData();
            const from = document.getElementById('salesFrom').value;
            const to = document.getElementById('salesTo').value;
            let sales = data.sales;
            if (from) sales = sales.filter(s => s.saleDate >= from);
            if (to) sales = sales.filter(s => s.saleDate <= to + 'T23:59:59');
            sales.sort((a,b) => new Date(b.saleDate) - new Date(a.saleDate));
            const tbody = document.querySelector('#salesTable tbody');
            tbody.innerHTML = '';
            sales.forEach(s => {
                tbody.innerHTML += `<tr>
                    <td>${new Date(s.saleDate).toLocaleString('en-PH',{hour12:true})}</td>
                    <td>₱${s.totalAmount.toFixed(2)}</td>
                    <td>₱${s.amountPaid.toFixed(2)}</td>
                    <td>₱${s.changeGiven.toFixed(2)}</td>
                    <td><button onclick="viewSaleDetails('${s.id}')">👁️</button></td>
                </tr>`;
            });
        }

        function viewSaleDetails(saleId) {
            const data = getData();
            const items = data.saleItems.filter(si => si.saleId === saleId);
            let msg = items.map(it => ${it.itemName} x${it.quantity} = ₱${it.lineTotal.toFixed(2)}).join('\n');
            alert('Sale Details:\n' + msg);
        }

        // ---------- Ingredients ----------
        function addIngredient() {
            const ingName = document.getElementById('ingName').value.trim();
            const ingQty = document.getElementById('ingQty').value.trim();
            const ingPrice = parseFloat(document.getElementById('ingPrice').value);
            const ingDate = document.getElementById('ingDate').value;
            const ingSupplier = document.getElementById('ingSupplier').value.trim();
            if (!ingName || !ingQty || isNaN(ingPrice)) { alert('Fill all required fields'); return; }
            const ingredient = { id: genId(), ingredient: ingName, quantity: ingQty, price: ingPrice, date: ingDate, supplier: ingSupplier };
            const data = getData();
            data.ingredients.push(ingredient);
            saveData(data);
            document.getElementById('ingName').value = '';
            document.getElementById('ingQty').value = '';
            document.getElementById('ingPrice').value = '';
            document.getElementById('ingDate').value = '';
            document.getElementById('ingSupplier').value = '';
            refreshIngredientsList();
        }

        function refreshIngredientsList() {
            const data = getData();
            const items = data.ingredients.sort((a,b) => new Date(b.date) - new Date(a.date));
            const tbody = document.querySelector('#ingredientsTable tbody');
            tbody.innerHTML = '';
            items.forEach(it => {
                tbody.innerHTML += <tr><td>${it.date}</td><td>${it.ingredient}</td><td>${it.quantity}</td><td>₱${it.price.toFixed(2)}</td></tr>;
            });
        }

        // ---------- Reports ----------
        function calculateReport() {
            const from = document.getElementById('reportFrom').value;
            const to = document.getElementById('reportTo').value;
            const data = getData();
            let sales = data.sales;
            let ings = data.ingredients;
            if (from) sales = sales.filter(s => s.saleDate >= from);
            if (to) sales = sales.filter(s => s.saleDate <= to + 'T23:59:59');
            if (from) ings = ings.filter(i => i.date >= from);
            if (to) ings = ings.filter(i => i.date <= to);
            const totalSales = sales.reduce((sum,s) => sum + s.totalAmount, 0);
            const totalCost = ings.reduce((sum,i) => sum + i.price, 0);
            document.getElementById('rSales').innerText = ₱${totalSales.toFixed(2)};
            document.getElementById('rCosts').innerText = ₱${totalCost.toFixed(2)};
            document.getElementById('rProfit').innerText = ₱${(totalSales-totalCost).toFixed(2)};
        }

        // ---------- Backup / Clear ----------
        function exportData() {
            const data = getData();
            const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = clarks_backup_${new Date().toISOString().slice(0,10)}.json;
            a.click();
        }

        function importBackup(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const backup = JSON.parse(e.target.result);
                    if (backup.sales && backup.saleItems && backup.ingredients) {
                        saveData(backup);
                        alert('Backup imported!');
                        refreshSalesList();
                        refreshIngredientsList();
                    } else throw new Error('Invalid');
                } catch(ex) { alert('Invalid backup file.'); }
            };
            reader.readAsText(file);
        }

        function clearAllData() {
            if (confirm('Delete all data permanently?')) {
                localStorage.removeItem(KEY);
                alert('All data cleared.');
                refreshSalesList();
                refreshIngredientsList();
            }
        }

        // ---------- Install PWA ----------
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'inline-block';
        });
        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => deferredPrompt = null);
            }
        }

        // ---------- Init ----------
        refreshSalesList();
        refreshIngredientsList();
        console.log('App ready – all functions loaded.');
    </script>
</body>
</html>
